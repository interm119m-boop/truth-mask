<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Truth Mask - Strategic Survival</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0f172a; color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 450px; min-height: 100vh; padding: 20px; padding-bottom: 100px; box-sizing: border-box; position: relative; }
        
        .screen { display: none; flex-direction: column; width: 100%; }
        .screen.active { display: flex; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #334155; text-align: center; }
        
        .btn { background: #2563eb; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 12px; font-size: 16px; transition: 0.2s; }
        .btn:active { background: #1d4ed8; transform: scale(0.98); }
        .btn-secondary { background: #475569; text-align: center; }
        
        .score-box { text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 15px; margin-bottom: 30px; }
        .timer { font-size: 60px; font-weight: bold; margin: 20px 0; color: #f87171; text-align: center; font-family: monospace; }
        .instruction { color: #94a3b8; font-size: 14px; margin-bottom: 20px; line-height: 1.5; text-align: center; }
        
        .player-tag { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; border: 1px solid transparent; text-align: center; cursor: pointer; }
        .player-tag.selected { border-color: #3b82f6; background: #1e293b; color: #60a5fa; }
        .highlight { color: #60a5fa; font-weight: bold; }
        .eliminated { text-decoration: line-through; color: #64748b; opacity: 0.5; cursor: default; }

        .footer-logo { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; text-align: center; pointer-events: none; }
        .footer-logo img { max-width: 150px; height: auto; opacity: 0.8; }
        
        .trust-count { color: #fbbf24; font-size: 12px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="score-box">
            <div style="font-size: 11px; color: #94a3b8; letter-spacing: 2px;">TRUST VALUE</div>
            <div id="score-display" style="font-size: 32px; font-weight: bold;">100억</div>
            <div id="trust-chance-display" class="trust-count">남은 유예 기회: 2회</div>
        </div>

        <div id="step-setup" class="screen active">
            <h1 style="text-align: center; margin-top: 40px;">TRUTH MASK</h1>
            <p class="instruction">조직 내 숨어든 라이어를 찾아내세요.</p>
            <button class="btn" onclick="setupGame(4)">4명</button>
            <button class="btn" onclick="setupGame(5)">5명</button>
            <button class="btn" style="grid-column: span 2;" onclick="setupGame(6)">6명 플레이 시작</button>
        </div>

        <div id="step-check" class="screen">
            <h2 id="check-title" style="text-align: center;">플레이어 1</h2>
            <div id="role-view" class="card" style="display:none;">
                <h3 id="role-identity"></h3>
                <p id="role-mission" style="color: #cbd5e1; font-size: 15px;"></p>
            </div>
            <button id="view-btn" class="btn" onclick="showRole()">역할 확인하기</button>
            <button id="next-btn" class="btn btn-secondary" style="display:none;" onclick="nextPlayer()">다음 사람에게 전달</button>
        </div>

        <div id="step-discuss" class="screen">
            <h2 id="round-title" style="text-align: center; font-size: 18px;">토론 라운드</h2>
            <div id="discuss-timer" class="timer">02:00</div>
            <button class="btn" onclick="goToVote()">의심 지목하기</button>
        </div>

        <div id="step-vote" class="screen">
            <h2 style="text-align: center;">의심 지목</h2>
            <div id="player-list"></div>
            <button class="btn" onclick="goToAction()">지목 완료</button>
        </div>

        <div id="step-action" class="screen">
            <h2 style="text-align: center;">대응 방식 결정</h2>
            <p class="instruction"><span id="voted-name" class="highlight"></span>님에 대한 팀의 태도는?</p>
            <button class="btn" style="background:#1e293b; border:1px solid #3b82f6; text-align:left;" onclick="setStrategy('RESPECT', 50)">
                <span style="color:#60a5fa">신뢰 기반 피드백</span><br><small>비난 없이 솔직한 공유를 요청합니다.</small>
            </button>
            <button class="btn" style="background:#1e293b; border:1px solid #3b82f6; text-align:left;" onclick="setStrategy('DIRECT', 30)">
                <span style="color:#60a5fa">데이터 중심 검증</span><br><small>객관적인 근거 자료를 요구합니다.</small>
            </button>
            <button class="btn" style="background:#1e293b; border:1px solid #3b82f6; text-align:left;" onclick="setStrategy('SILENCE', 0)">
                <span style="color:#60a5fa">침묵과 방관</span><br><small>일단 믿어주고 넘어가기로 합니다.</small>
            </button>
        </div>

        <div id="step-defense" class="screen">
            <h2 style="text-align: center;">최후 변론</h2>
            <div class="card">
                <p style="font-size: 14px; color: #94a3b8;">팀의 대응: <span id="chosen-strategy" class="highlight"></span></p>
                <div id="defense-timer" class="timer">01:00</div>
                <p id="defense-instruction" style="font-weight: bold;"></p>
            </div>
            <button id="def-start-btn" class="btn" onclick="startDefenseTimer()">타이머 시작</button>
            <button id="def-skip-btn" class="btn btn-secondary" style="display:none;" onclick="stopDefenseAndGo()">변론 조기 종료</button>
            <button id="def-final-btn" class="btn" style="display:none;" onclick="goToFinalVote()">변론 완료 (결정)</button>
        </div>

        <div id="step-final" class="screen">
            <h2 style="text-align: center;">최종 결정</h2>
            <div class="card"><p><span id="final-target" class="highlight"></span>님을 팀에서 제외할까요?</p></div>
            <button class="btn" onclick="processResult(true)">예 (제외)</button>
            <button class="btn btn-secondary" onclick="processResult(false)">아니오 (신뢰 부여)</button>
        </div>

        <div id="step-round-result" class="screen">
            <div class="card" id="round-card" style="border-width: 4px;">
                <h2 id="round-status"></h2>
                <p id="round-detail"></p>
            </div>
            <button class="btn" onclick="nextRound()">다음 라운드 계속</button>
        </div>

        <div id="step-result" class="screen">
            <div id="result-card" class="card" style="border-width: 4px;">
                <h2 id="reveal-status"></h2>
                <p id="reveal-details" style="margin-bottom: 20px;"></p>
                <hr style="border: 0; border-top: 1px solid #334155; margin-bottom: 20px;">
                <h3 id="team-diagnosis"></h3>
            </div>
            <button class="btn" onclick="location.reload()">새 게임 시작</button>
        </div>

        <div class="footer-logo">
            <img src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2FOXl8z%2FdJMcahXQ4U0%2FAAAAAAAAAAAAAAAAAAAAAHHiLcWZQkVPFw8vsCIDJMBG_R_kTSLruaxg9CK_YIOX%2Fimg.png%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1774969199%26allow_ip%3D%26allow_referer%3D%26signature%3Da1LSbIG5n3nfrApoj6S1AinQQmw%253D" alt="Company Logo">
        </div>
    </div>

    <script>
        let players = []; 
        let votedIndex = -1, currentPlayerIndex = 0;
        let score = 100, timer, currentStrategy = {};
        let trustChance = 2; 

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setupGame(n) {
            const roles = new Array(n).fill('TEAM_MEMBER');
            roles[Math.floor(Math.random() * n)] = 'LIAR';
            players = roles.map((role, i) => ({ id: i + 1, isLiar: role === 'LIAR', isEliminated: false }));
            showScreen('step-check');
        }

        function showRole() {
            const p = players[currentPlayerIndex];
            document.getElementById('role-identity').innerText = p.isLiar ? "🤫 당신은 [라이어]" : "📢 당신은 [팀원]";
            document.getElementById('role-mission').innerText = p.isLiar ? "정체를 숨기세요." : "라이어를 지목하세요.";
            document.getElementById('role-view').style.display = 'block';
            document.getElementById('view-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextPlayer() {
            if (currentPlayerIndex < players.length - 1) {
                currentPlayerIndex++;
                document.getElementById('check-title').innerText = `플레이어 ${currentPlayerIndex + 1}`;
                document.getElementById('role-view').style.display = 'none';
                document.getElementById('view-btn').style.display = 'block';
                document.getElementById('next-btn').style.display = 'none';
            } else {
                nextRound();
            }
        }

        function nextRound() {
            const aliveCount = players.filter(p => !p.isEliminated).length;
            document.getElementById('round-title').innerText = `토론 라운드 (생존: ${aliveCount}명)`;
            showScreen('step-discuss');
            startTimer('discuss-timer', 120, goToVote);
        }

        function startTimer(id, sec, callback) {
            let time = sec;
            clearInterval(timer);
            timer = setInterval(() => {
                time--;
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById(id).innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                if (time <= 0) { clearInterval(timer); callback(); }
            }, 1000);
        }

        function goToVote() {
            clearInterval(timer);
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            players.forEach((p, i) => {
                const d = document.createElement('div');
                d.className = 'player-tag' + (p.isEliminated ? ' eliminated' : '');
                d.innerText = `플레이어 ${p.id}` + (p.isEliminated ? ' (제외됨)' : '');
                if(!p.isEliminated) {
                    d.onclick = () => {
                        document.querySelectorAll('.player-tag').forEach(t => t.classList.remove('selected'));
                        d.classList.add('selected');
                        votedIndex = i;
                    };
                }
                list.appendChild(d);
            });
            showScreen('step-vote');
        }

        function goToAction() {
            if (votedIndex === -1) return alert("대상을 선택하세요!");
            document.getElementById('voted-name').innerText = `플레이어 ${players[votedIndex].id}`;
            showScreen('step-action');
        }

        function setStrategy(label, plus) {
            currentStrategy = { label, plus };
            document.getElementById('chosen-strategy').innerText = label;
            document.getElementById('defense-instruction').innerText = "해명을 시작하세요.";
            document.getElementById('def-start-btn').style.display = 'block';
            document.getElementById('def-skip-btn').style.display = 'none';
            document.getElementById('def-final-btn').style.display = 'none';
            showScreen('step-defense');
        }

        function startDefenseTimer() {
            document.getElementById('def-start-btn').style.display = 'none';
            document.getElementById('def-skip-btn').style.display = 'block';
            startTimer('defense-timer', 60, () => {
                document.getElementById('def-skip-btn').style.display = 'none';
                document.getElementById('def-final-btn').style.display = 'block';
            });
        }

        function stopDefenseAndGo() {
            clearInterval(timer);
            goToFinalVote();
        }

        function goToFinalVote() {
            document.getElementById('final-target').innerText = `플레이어 ${players[votedIndex].id}`;
            showScreen('step-final');
        }

        function processResult(isExecute) {
            const target = players[votedIndex];
            
            if (isExecute) { 
                if (target.isLiar) { 
                    score += currentStrategy.plus;
                    showFinalEnd("라이어 검거 성공!", `플레이어 ${target.id}는 라이어였습니다! 위기를 막아냈습니다.`, true);
                } else { 
                    target.isEliminated = true;
                    score -= 30;
                    const aliveCount = players.filter(p => !p.isEliminated).length;
                    if (aliveCount <= 2) { 
                        score -= 50;
                        showFinalEnd("조직 붕괴 (패배)", `무고한 팀원들을 너무 많이 잃었습니다.`, false);
                    } else {
                        showRoundResult("팀원 제외됨", `플레이어 ${target.id}는 팀원이었습니다. 정체가 탄로 났습니다.`);
                    }
                }
            } else { 
                trustChance--;
                document.getElementById('trust-chance-display').innerText = `남은 유예 기회: ${trustChance}회`;

                if (trustChance < 0) {
                    showFinalEnd("상황을 방관하는 팀", "결정을 미루는 사이 조직의 신뢰는 완전히 파괴되었습니다.", false, true);
                } else {
                    if (target.isLiar) score -= 20;
                    else score += 10;
                    showRoundResult("신뢰 유지", `대상을 다시 믿기로 했습니다. 정체는 공개되지 않았습니다. (남은 기회: ${trustChance}회)`);
                }
            }
            document.getElementById('score-display').innerText = score + "억";
        }

        function showRoundResult(status, detail) {
            document.getElementById('round-status').innerText = status;
            document.getElementById('round-detail').innerText = detail;
            document.getElementById('round-card').style.borderColor = "#f59e0b";
            showScreen('step-round-result');
        }

        function showFinalEnd(status, detail, success, isBystander = false) {
            document.getElementById('reveal-status').innerText = status;
            document.getElementById('reveal-details').innerText = detail;
            
            let diagnosis = "";
            let color = "";

            if (isBystander) {
                diagnosis = "진단 결과: [상황을 방관하는 팀] 😶";
                color = "#94a3b8"; // 회색 (방관)
            } else {
                if (score >= 80) { diagnosis = "진단 결과: [혁신하는 팀] 🌟"; color = "#10b981"; }
                else if (score >= 60) { diagnosis = "진단 결과: [위험한 팀] ⚠️"; color = "#f59e0b"; }
                else if (score >= 40) { diagnosis = "진단 결과: [쇠퇴하는 팀] 📉"; color = "#f87171"; }
                else { diagnosis = "진단 결과: [팀 붕괴] 💀"; color = "#ef4444"; }
            }

            document.getElementById('team-diagnosis').innerText = diagnosis;
            document.getElementById('team-diagnosis').style.color = color;
            document.getElementById('result-card').style.borderColor = color;
            showScreen('step-result');
        }
    </script>
</body>
</html>
